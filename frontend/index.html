<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#FF6B9D">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="日語冒險">
    <meta name="description" content="60天通关 JLPT N5 的游戏化日语学习平台">
    <title>Nihongo Quest - 日語冒險</title>
    <!-- 防止 iOS Safari 双击缩放 -->
    <style>
      * { touch-action: manipulation; }
      body { margin: 0; -webkit-tap-highlight-color: transparent; }
      /* iOS safe area */
      #app { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
      /* 启动画面背景 */
      html { background: linear-gradient(135deg, #F8F6FF 0%, #FFF5F7 100%); }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
